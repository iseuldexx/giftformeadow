<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>A Gift for Meadows</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #222;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
    padding: 20px;
  }
  h1 {
    margin-bottom: 10px;
  }
  #instructions {
    margin-bottom: 10px;
    font-size: 14px;
    max-width: 800px;
    text-align: center;
  }
  #buttons {
    margin-bottom: 10px;
  }
  button {
    margin: 0 5px;
    padding: 8px 12px;
    font-size: 14px;
    cursor: pointer;
  }
  #controls {
    margin-bottom: 10px;
    display: flex;
    align-items: center;
  }
  label {
    margin-right: 8px;
  }
  #brushSizeSlider {
    margin-left: 5px;
  }
  #shapeSelect {
    margin-left: 10px;
  }
  canvas {
    border: 2px solid #333;
    display: block;
    margin-top: 10px;
  }
</style>
</head>
<body>
<h1>A Gift for Meadows</h1>
<div id="instructions">
  Use the buttons to select mode. Adjust brush size with the slider. Choose shape for scratching. Use Undo or Save.
</div>
<div id="buttons">
  <button id="scratchBtn">Scratch Mode</button>
  <button id="eraserBtn">Eraser Mode</button>
  <button id="undoBtn">Undo</button>
  <button id="saveBtn">Save Image</button>
</div>
<div id="controls">
  <label for="brushSizeSlider">Brush Size:</label>
  <input type="range" id="brushSizeSlider" min="5" max="100" value="30" />
  <select id="shapeSelect">
    <option value="circle">Circle</option>
    <option value="square">Square</option>
    <option value="heart">Heart</option>
    <option value="star">Star</option>
  </select>
</div>
<canvas id="scratch" width="600" height="600"></canvas>
<script>
const canvas = document.getElementById('scratch');
const ctx = canvas.getContext('2d');

const bgCanvas = document.createElement('canvas');
const bgCtx = bgCanvas.getContext('2d');
bgCanvas.width = canvas.width;
bgCanvas.height = canvas.height;

let isDrawing = false;
let lastX, lastY;
let mode = 'scratch'; // 'scratch' or 'erase'
let isEraserMode = false;
const undoStack = [];
const maxUndo = 20;
let currentBrushSize = document.getElementById('brushSizeSlider').value;
let currentShape = document.getElementById('shapeSelect').value;

// Buttons
const scratchBtn = document.getElementById('scratchBtn');
const eraserBtn = document.getElementById('eraserBtn');
const undoBtn = document.getElementById('undoBtn');
const saveBtn = document.getElementById('saveBtn');

const brushSizeSlider = document.getElementById('brushSizeSlider');
const shapeSelect = document.getElementById('shapeSelect');

scratchBtn.addEventListener('click', () => {
  mode = 'scratch';
  isEraserMode = false;
  updateModeButtons();
});
eraserBtn.addEventListener('click', () => {
  mode = 'erase';
  isEraserMode = true;
  updateModeButtons();
});
undoBtn.addEventListener('click', () => {
  undo();
});
saveBtn.addEventListener('click', () => {
  saveImage();
});
brushSizeSlider.addEventListener('input', () => {
  currentBrushSize = parseInt(brushSizeSlider.value);
});
shapeSelect.addEventListener('change', () => {
  currentShape = shapeSelect.value;
});

function updateModeButtons() {
  scratchBtn.style.backgroundColor = mode === 'scratch' ? '#0f0' : '';
  eraserBtn.style.backgroundColor = mode === 'erase' ? '#0f0' : '';
}

// Generate rainbow background
function generateRainbowBackground() {
  const gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
  gradient.addColorStop(0, 'red');
  gradient.addColorStop(0.16, 'orange');
  gradient.addColorStop(0.33, 'yellow');
  gradient.addColorStop(0.5, 'green');
  gradient.addColorStop(0.66, 'blue');
  gradient.addColorStop(0.83, 'indigo');
  gradient.addColorStop(1, 'violet');

  bgCtx.fillStyle = gradient;
  bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
}

generateRainbowBackground();

// Initialize overlay
function initCanvas() {
  ctx.fillStyle = 'black';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}
initCanvas();
drawBackground();

function drawBackground() {
  ctx.drawImage(bgCanvas, 0, 0);
}

// Save state for undo
function saveState() {
  if (undoStack.length >= maxUndo) {
    undoStack.shift();
  }
  undoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
}

// Undo function
function undo() {
  if (undoStack.length === 0) return;
  const previousState = undoStack.pop();
  ctx.putImageData(previousState, 0, 0);
}

// Save image
function saveImage() {
  const link = document.createElement('a');
  link.download = 'rainbow-scratch.png';
  link.href = canvas.toDataURL();
  link.click();
}

function getPointerPosition(e) {
  const rect = canvas.getBoundingClientRect();
  if (e.touches) {
    return {
      x: e.touches[0].clientX - rect.left,
      y: e.touches[0].clientY - rect.top
    };
  } else {
    return {
      x: e.clientX - rect.left,
      y: e.clientY - rect.top
    };
  }
}

// Draw shape based on current settings
function drawShape(x, y) {
  ctx.globalCompositeOperation = isEraserMode ? 'destination-out' : 'source-over';
  ctx.fillStyle = 'black';

  switch(currentShape) {
    case 'circle':
      ctx.beginPath();
      ctx.arc(x, y, currentBrushSize, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'square':
      ctx.fillRect(x - currentBrushSize, y - currentBrushSize, currentBrushSize * 2, currentBrushSize * 2);
      break;
    case 'heart':
      drawHeart(x, y, currentBrushSize);
      break;
    case 'star':
      drawStar(x, y, currentBrushSize);
      break;
  }
}

// Draw Heart shape
function drawHeart(x, y, size) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(size / 10, size / 10);
  ctx.beginPath();
  ctx.moveTo(0, -10);
  ctx.bezierCurveTo(10, -20, 20, -10, 0, 10);
  ctx.bezierCurveTo(-20, -10, -10, -20, 0, -10);
  ctx.fill();
  ctx.restore();
}

// Draw Star shape
function drawStar(x, y, size) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(size / 10, size / 10);
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    ctx.lineTo(Math.cos((18 + i * 72) * Math.PI / 180) * 10, Math.sin((18 + i * 72) * Math.PI / 180) * 10);
    ctx.lineTo(Math.cos((54 + i * 72) * Math.PI / 180) * 4, Math.sin((54 + i * 72) * Math.PI / 180) * 4);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// Event handlers
canvas.addEventListener('mousedown', startDrawing);
canvas.addEventListener('touchstart', startDrawing);
canvas.addEventListener('mouseup', stopDrawing);
canvas.addEventListener('touchend', stopDrawing);
canvas.addEventListener('mouseout', stopDrawing);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('touchmove', draw);

function startDrawing(e) {
  e.preventDefault();
  isDrawing = true;
  saveState();
  const pos = getPointerPosition(e);
  drawShape(pos.x, pos.y);
}
function stopDrawing(e) {
  e.preventDefault();
  isDrawing = false;
}
function draw(e) {
  if (!isDrawing) return;
  e.preventDefault();
  const pos = getPointerPosition(e);
  drawShape(pos.x, pos.y);
}

updateModeButtons();

</script>
</body>
</html>
